<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Solicitar eliminación de usuario - MD WALLET</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f5f7fa; color:#222; margin:0; }
    .container { max-width:700px; margin:40px auto; background:#fff; padding:24px; border-radius:6px; box-shadow:0 2px 6px rgba(0,0,0,.08); }
    h1 { margin-top:0; color:#0f172a }
    label { display:block; margin-top:12px; font-weight:600 }
    input[type=text], input[type=email], textarea { width:100%; padding:8px 10px; margin-top:6px; border:1px solid #ddd; border-radius:4px }
    button { margin-top:16px; background:#0f172a; color:#fff; border:none; padding:10px 14px; border-radius:6px; cursor:pointer }
    a { color:#0f172a }
  </style>
</head>
<body>
  <div class="container">
    <h1>Solicitar eliminación de usuario</h1>
    <p>Use este formulario para solicitar la eliminación de su cuenta. Solo se requiere el correo registrado.</p>

    <form action="/eliminar-usuario" method="POST">
      <label for="email">Correo registrado (requerido)</label>
      <input id="email" name="email" type="email" required placeholder="tucorreo@ejemplo.com" />

      <button type="submit">Enviar solicitud</button>
    </form>

    <p style="margin-top:14px"><a href="/">Volver al inicio</a></p>
  </div>
</body>
</html>
